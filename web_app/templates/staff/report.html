{% extends 'staff/base_staff.html' %}

{% block title %}報表 — 絕佳食雞{% endblock %}

{% block staff_content %}
<h4 class="text-yellow mb-4"><i class="bi bi-bar-chart-line"></i> 營運報表</h4>

<!-- Daily Report -->
<div class="card card-dark mb-4">
    <div class="card-header border-bottom border-secondary">
        <h5 class="mb-0" style="color: var(--text-primary);">
            <i class="bi bi-calendar-day"></i> 日報表（近 30 天）
        </h5>
    </div>
    <div class="card-body">
        <div id="dailyChart" style="width: 100%; height: 400px;"></div>
    </div>
</div>

<!-- Monthly Report -->
<div class="card card-dark mb-4">
    <div class="card-header border-bottom border-secondary">
        <h5 class="mb-0" style="color: var(--text-primary);">
            <i class="bi bi-calendar-month"></i> 月報表（近 12 個月）
        </h5>
    </div>
    <div class="card-body">
        <div id="monthlyChart" style="width: 100%; height: 400px;"></div>
    </div>
</div>
{% endblock %}

{% block staff_css %}
<link rel="stylesheet" href="{% static 'css/report.css' %}?v=3">
{% endblock %}

{% block staff_js %}
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
{# 將 Django 資料注入為全域 JS 變數，供 report.js 讀取 #}
<script>
    window.REPORT_DATA = {
        daily: {{ daily_data|safe }},
        monthly: {{ monthly_data|safe }}
    };
</script>
<script src="{% static 'js/report.js' %}?v=1"></script>
{% endblock %}
