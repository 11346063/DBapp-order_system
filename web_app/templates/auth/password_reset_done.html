{% extends 'base.html' %}
{% load static %}

{% block title %}重設信已寄出 — 絕佳食雞{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="card card-dark auth-card">
        <div class="card-body p-4 text-center">
            <i class="bi bi-envelope-check fs-1 text-yellow"></i>
            <h4 class="text-white mt-3">重設信已寄出</h4>
            <p class="text-secondary small">若此 Email 已綁定帳號，系統會寄出密碼重設連結。</p>
            <a href="{% url 'web_app:login' %}" class="btn btn-yellow w-100 py-2 fw-bold">
                返回登入
            </a>
        </div>
    </div>
</div>
{% endblock %}
