{% extends 'base.html' %}
{% load static %}

{% block title %}密碼已更新 — 絕佳食雞{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="card card-dark auth-card">
        <div class="card-body p-4 text-center">
            <i class="bi bi-check-circle fs-1 text-yellow"></i>
            <h4 class="text-white mt-3">密碼已更新</h4>
            <p class="text-secondary small">請使用新密碼重新登入。</p>
            <a href="{% url 'web_app:login' %}" class="btn btn-yellow w-100 py-2 fw-bold">
                前往登入
            </a>
        </div>
    </div>
</div>
{% endblock %}
