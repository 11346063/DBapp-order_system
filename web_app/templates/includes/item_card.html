<div class="col-6 col-md-4 col-lg-3 menu-item" data-type-id="{{ item.type_id }}" data-name="{{ item.name }}">
    <div class="card card-dark h-100 item-card{% if is_staff and not item.status %} item-card-inactive{% endif %}" role="button" onclick="openItemDetail({{ item.id }})">
        <div class="card-img-top-placeholder d-flex align-items-center justify-content-center position-relative">
            <i class="bi bi-egg-fried fs-1 text-secondary"></i>
            {% if is_staff and not item.status %}
            <span class="badge bg-danger position-absolute top-0 start-0 m-2">已下架</span>
            {% endif %}
        </div>
        <div class="card-body p-3">
            <h6 class="card-title mb-2 text-white">{{ item.name }}</h6>
            <span class="badge badge-yellow">${{ item.price }}</span>
        </div>
    </div>
</div>
