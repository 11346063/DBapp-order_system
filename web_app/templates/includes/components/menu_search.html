{% load i18n %}
<form class="menu-search mb-3" method="get" action="">
    <label class="visually-hidden" for="menuSearchInput">{% trans "搜尋餐點" %}</label>
    <div class="input-group">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input
            id="menuSearchInput"
            class="form-control"
            type="search"
            name="q"
            value="{{ search_query }}"
            placeholder="{% trans '搜尋餐點、分類或備註' %}"
        >
        {% if search_query %}
        <a class="btn btn-outline-secondary" href="{{ request.path }}">{% trans "清除" %}</a>
        {% endif %}
        <button class="btn btn-yellow" type="submit">{% trans "搜尋" %}</button>
    </div>
</form>
