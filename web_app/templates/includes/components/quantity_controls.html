{% comment %}
Component: QuantityControls
Props:
  - qty_id (required): quantity display id used by detail.js
  - wrapper_class (optional): outer wrapper classes
{% endcomment %}
<div class="{{ wrapper_class|default:'d-flex align-items-center gap-3 mb-3' }}">
    <button class="btn btn-outline-light btn-sm rounded-circle qty-btn" onclick="changeQty(-1)">
        <i class="bi bi-dash"></i>
    </button>
    <span class="fs-5 fw-bold text-white" id="{{ qty_id }}">1</span>
    <button class="btn btn-outline-light btn-sm rounded-circle qty-btn" onclick="changeQty(1)">
        <i class="bi bi-plus"></i>
    </button>
</div>
