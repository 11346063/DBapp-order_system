{% extends 'base.html' %}
{% load static i18n %}

{% block title %}{% trans "購物車" %} — 絕佳食雞{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/cart.css' %}?v=3">
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center gap-3 mb-4">
    <h4 class="text-white mb-0"><i class="bi bi-cart3"></i> {% trans "購物車" %}</h4>
    <a href="{{ ordering_return_url }}" class="btn btn-outline-light">
        <i class="bi bi-arrow-left"></i> {% trans "返回點餐" %}
    </a>
</div>

<div id="cartList"></div>
<div id="cartFooter"></div>
{% endblock %}

{% block extra_js %}
<script>
window.ORDERING_RETURN_URL = '{{ ordering_return_url }}';
window.PAYMENT_URL = '{% url "web_app:payment" %}';
</script>
{% endblock %}
