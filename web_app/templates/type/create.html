<h2>新增種類</h2>

    {% csrf_token %}


    <div>
        <label for="id_type_name">標題：</label>
        <input type="text" name="type_name" id="id_type_name"  value="{{ form.type_name.value|default_if_none:'' }}">

    <button type="submit">送出</button>
</form>
